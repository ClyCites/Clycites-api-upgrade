name: Pull Request Checks

on:
  pull_request:
    branches: [ staging, master ]
    types: [ opened, synchronize, reopened, edited ]

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
      
      - name: Check branch naming
        shell: bash
        run: |
          BRANCH_NAME=${{ github.head_ref }}
          if [[ ! $BRANCH_NAME =~ ^(feature|fix|docs|hotfix|refactor|test|ci)\/[a-z0-9\-\/]+$ ]]; then
            echo "Branch name does not follow convention: $BRANCH_NAME"
            echo "Expected format: feature/*, fix/*, docs/*, hotfix/*, refactor/*, test/*, or ci/*"
            exit 1
          fi
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check code changes
        run: npx eslint src --ext .ts

      
      - name: Run tests
        run: npm test
      
      - name: Comment PR with build status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}';
            const statusEmoji = buildStatus === 'success' ? '✅' : '❌';
            const comment = `${statusEmoji} **Build Status:** ${buildStatus.toUpperCase()}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

  code-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate coverage report
        run: npm test
      
      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage/coverage-final.json') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
