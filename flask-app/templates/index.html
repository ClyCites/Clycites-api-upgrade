<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Prediction</title>
</head>
<body>
    <h1>Enter Features to Predict Price</h1>
    <form action="/predict" method="POST">
        <label for="feature_1">Feature 1:</label>
        <input type="text" id="feature_1" name="feature_1" required><br><br>

        <label for="feature_2">Feature 2:</label>
        <input type="text" id="feature_2" name="feature_2" required><br><br>

        <!-- Add more features if needed -->
        
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Predicted Price: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
